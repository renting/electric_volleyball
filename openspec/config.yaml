schema: spec-driven

context: |
  預設使用繁體中文（zh-TW）產出所有 OpenSpec 文件與回覆內容。
  不過不得犧牲原始技術語意、規格嚴謹性與可執行性。

  語言與內容原則：
  - 說明文字、段落標題、需求描述、任務敘述一律使用繁體中文。
  - 程式碼、API 名稱、類別名、函式名、檔名、路徑、指令、commit type、規格關鍵字可保留原文。
  - 若英文術語比翻譯更精確，優先保留英文，必要時以繁中補充說明。
  - 不可因為本地化而省略限制條件、邊界情境、驗收標準、風險、相依性或技術細節。
  - 內容應具體、可落地、可驗證，避免空泛敘述與過度行銷式語氣。

  文件品質原則：
  - 優先保留原本核心：需求意圖、技術約束、實作範圍、驗收方式。
  - 先講清楚「要解決什麼問題」，再描述方案與影響。
  - 若需求有不確定性，應明確標示假設，而不是自行模糊帶過。
  - 規格、proposal、tasks 之間必須一致，不可互相矛盾。
  - 任務拆解應偏向可直接執行與驗證的粒度。

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
# Example:
#   context: |
#     Tech stack: TypeScript, React, Node.js
#     We use conventional commits
#     Domain: e-commerce platform

# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
# Example:
#   rules:
#     proposal:
#       - Keep proposals under 500 words
#       - Always include a "Non-goals" section
#     tasks:
#       - Break tasks into chunks of max 2 hours
rules:
  proposal:
    - 使用繁體中文撰寫，但保留必要英文技術名詞與識別字。
    - 先交代問題、目標、範圍與非目標，再描述方案。
    - 明確寫出風險、取捨、相依性與受影響範圍。
    - 避免空泛形容詞；每個主張都應可被實作或驗證。

  spec:
    - 使用繁體中文撰寫需求與驗收敘述。
    - 不得弱化原始需求的約束、邊界條件與成功標準。
    - 驗收標準需具體、可測試、避免模糊字眼。
    - 牽涉現有行為時，需清楚標示保留項與變更項。

  tasks:
    - 使用繁體中文撰寫任務，但保留檔名、模組名、命令與程式術語原文。
    - 任務應拆成小而可執行的步驟，避免單一任務過大。
    - 每項任務應指向明確產出或驗證結果。
    - 若有前後依賴，任務順序需反映實際實作流程.
