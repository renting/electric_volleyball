<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電氣鼠排球大作戰</title>
<style>
  :root{
    --sky-top:#7ec8ff; --sky-bot:#d8f1ff;
    --sand:#f2d98c; --sand-dark:#e0bf66;
    --ink:#23314a; --accent:#ffb800; --hot:#ff5c5c;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:14px; padding:16px;
    background:linear-gradient(180deg,#1b2a4a 0%,#27406e 100%);
    font-family:"Trebuchet MS","Microsoft JhengHei",sans-serif; color:#fff;
  }
  h1{
    font-size:clamp(20px,4vw,34px); letter-spacing:2px;
    text-shadow:0 3px 0 rgba(0,0,0,.35);
  }
  h1 .bolt{color:var(--accent);}
  #wrap{position:relative; width:min(96vw,920px);}
  canvas{
    display:block; width:100%; height:auto; border-radius:14px;
    box-shadow:0 12px 40px rgba(0,0,0,.45);
    background:linear-gradient(180deg,var(--sky-top),var(--sky-bot));
    touch-action:none;
  }
  #hint{
    font-size:13px; line-height:1.7; opacity:.85; text-align:center; max-width:760px;
  }
  kbd{
    background:#fff; color:var(--ink); border-radius:5px; padding:1px 7px;
    font-family:inherit; font-weight:bold; box-shadow:0 2px 0 rgba(0,0,0,.3);
    font-size:12px;
  }
</style>
</head>
<body>
<h1>⚡ 電氣鼠排球大作戰 <span class="bolt">PIKA VOLLEY</span> ⚡</h1>
<div id="wrap"><canvas id="game" width="900" height="500"></canvas></div>
<div id="hint">
  單人:<kbd>←</kbd><kbd>→</kbd> 移動 <kbd>↑</kbd> 跳躍 <kbd>Space</kbd>/<kbd>Z</kbd> 強力扣殺&nbsp;&nbsp;|&nbsp;&nbsp;
  雙人:P1 <kbd>A</kbd><kbd>D</kbd><kbd>W</kbd> + <kbd>G</kbd> 扣殺,P2 用方向鍵 + <kbd>L</kbd> 扣殺。<br>
  <kbd>P</kbd>/<kbd>Esc</kbd> 暫停 ・ <kbd>R</kbd> 重新開始 ・ 先得 15 分獲勝!
</div>
<script>
"use strict";
const cvs = document.getElementById("game");
const ctx = cvs.getContext("2d");
const W = cvs.width, H = cvs.height;
const GROUND = H - 46;
const NET_X = W / 2, NET_W = 10, NET_TOP = GROUND - 170;
const WIN_SCORE = 15;

// ---------- 音效 ----------
let actx = null;
function beep(freq, dur = 0.07, type = "square", vol = 0.12) {
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + dur);
  } catch (e) {}
}

// ---------- 輸入 ----------
const keys = {};
window.addEventListener("keydown", e => {
  keys[e.code] = true;
  if (["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code)) e.preventDefault();
  if (state === "menu") {
    if (e.code === "Digit1") startGame("1P", "normal");
    if (e.code === "Digit2") startGame("1P", "hard");
    if (e.code === "Digit3") startGame("2P", null);
  } else if (state === "over") {
    if (e.code === "Enter") state = "menu";
    if (e.code === "KeyR") startGame(mode, aiLevel);
  } else {
    // 遊戲進行中
    if (e.code === "KeyP" || e.code === "Escape") {
      paused = !paused;
      beep(paused ? 300 : 520, .08, "triangle");
    }
    if (e.code === "KeyR") startGame(mode, aiLevel);
  }
});
window.addEventListener("keyup", e => keys[e.code] = false);
cvs.addEventListener("pointerdown", () => {
  if (state === "menu") startGame("1P", "normal");
  else if (state === "over") state = "menu";
  else if (paused) paused = false;
});

// ---------- 遊戲狀態 ----------
let state = "menu";      // menu | serve | play | point | over
let paused = false;
let mode = "1P", aiLevel = "normal";
let score = [0, 0];
let serveTimer = 0, pointTimer = 0, pointSide = 0;
let shakeT = 0;
let particles = [];
let clouds = [
  {x:120,y:70,s:1},{x:420,y:110,s:.7},{x:700,y:60,s:1.2},{x:830,y:140,s:.6}
];

const players = [makePlayer(0), makePlayer(1)];
const ball = { x: 0, y: 0, vx: 0, vy: 0, r: 17, spin: 0 };

function makePlayer(side) {
  return {
    side, r: 34,
    x: side === 0 ? W * 0.25 : W * 0.75,
    y: GROUND, vy: 0,
    onGround: true,
    hitCooldown: 0, smashFlash: 0,
    face: side === 0 ? 1 : -1,
    aiHitDelay: 0
  };
}

function startGame(m, lvl) {
  mode = m; if (lvl) aiLevel = lvl;
  score = [0, 0];
  paused = false;
  particles = [];
  resetRally(Math.random() < 0.5 ? 0 : 1);
  state = "serve";
  beep(660, .1, "triangle"); beep(880, .12, "triangle");
}

function resetRally(side) {
  players[0].x = W * 0.25; players[1].x = W * 0.75;
  players.forEach(p => { p.y = GROUND; p.vy = 0; p.onGround = true; });
  ball.x = side === 0 ? W * 0.25 : W * 0.75;
  ball.y = 110; ball.vx = 0; ball.vy = 0; ball.spin = 0;
  serveTimer = 50;
}

// ---------- 玩家控制 ----------
function controlHuman(p, left, right, up, hit) {
  const SPD = 5.4;
  if (keys[left])  { p.x -= SPD; p.face = -1; }
  if (keys[right]) { p.x += SPD; p.face = 1; }
  if (keys[up] && p.onGround) { p.vy = -13.5; p.onGround = false; beep(330, .05, "sine", .06); }
  if (keys[hit] && p.hitCooldown <= 0) tryPowerHit(p);
}

function controlAI(p) {
  const SPD = aiLevel === "hard" ? 5.6 : 4.6;
  const onMySide = ball.x > NET_X;
  let target = onMySide ? predictBallX() : W * 0.75;
  target = Math.max(NET_X + p.r + 14, Math.min(W - p.r, target));
  const jitter = aiLevel === "hard" ? 4 : 14;
  if (Math.abs(p.x - target) > jitter) {
    p.x += p.x < target ? SPD : -SPD;
    p.face = ball.x < p.x ? -1 : 1;
  }
  const dx = ball.x - p.x, dy = ball.y - (p.y - p.r);
  if (p.onGround && onMySide && Math.abs(dx) < 70 && dy < 0 && dy > -190 && ball.vy > -2) {
    p.vy = -13.5; p.onGround = false;
  }
  const dist = Math.hypot(ball.x - p.x, ball.y - (p.y - p.r * 0.4));
  if (dist < p.r + ball.r + 26 && p.hitCooldown <= 0) {
    p.aiHitDelay--;
    if (p.aiHitDelay <= 0) {
      if (Math.random() < (aiLevel === "hard" ? 0.7 : 0.4)) tryPowerHit(p);
      p.aiHitDelay = 6;
    }
  }
}

function predictBallX() {
  // 簡單模擬球落點
  let x = ball.x, y = ball.y, vx = ball.vx, vy = ball.vy;
  for (let i = 0; i < 200; i++) {
    vy += 0.42; x += vx; y += vy;
    if (x < ball.r || x > W - ball.r) vx *= -1;
    if (y >= GROUND - ball.r) break;
  }
  return x;
}

function tryPowerHit(p) {
  const dx = ball.x - p.x, dy = ball.y - (p.y - p.r * 0.4);
  const dist = Math.hypot(dx, dy);
  if (dist < p.r + ball.r + 24) {
    const dir = p.side === 0 ? 1 : -1;
    const aimDown = ball.y < NET_TOP + 30 ? 0.85 : 0.25;
    ball.vx = dir * (11 + Math.random() * 3);
    ball.vy = -3 + aimDown * 12 * Math.random() + (ball.y < NET_TOP ? 6 : -6);
    ball.spin = dir * 0.5;
    p.hitCooldown = 18; p.smashFlash = 12;
    shakeT = 8;
    burst(ball.x, ball.y, "#ffd92e", 14);
    beep(180, .12, "sawtooth", .18); beep(90, .15, "square", .12);
  } else {
    p.hitCooldown = 10;
  }
}

// ---------- 物理 ----------
function physics() {
  // 玩家
  for (const p of players) {
    p.vy += 0.7; p.y += p.vy;
    if (p.y >= GROUND) { p.y = GROUND; p.vy = 0; p.onGround = true; }
    const minX = p.side === 0 ? p.r : NET_X + NET_W / 2 + p.r;
    const maxX = p.side === 0 ? NET_X - NET_W / 2 - p.r : W - p.r;
    p.x = Math.max(minX, Math.min(maxX, p.x));
    if (p.hitCooldown > 0) p.hitCooldown--;
    if (p.smashFlash > 0) p.smashFlash--;
  }

  if (state === "serve") {
    serveTimer--;
    if (serveTimer <= 0) state = "play";
    return;
  }
  if (state !== "play") return;

  // 球
  ball.vy += 0.42;
  ball.x += ball.vx; ball.y += ball.vy;
  ball.spin *= 0.99;

  // 牆與天花板
  if (ball.x < ball.r)      { ball.x = ball.r; ball.vx = Math.abs(ball.vx) * 0.9; beep(440,.04); }
  if (ball.x > W - ball.r)  { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx) * 0.9; beep(440,.04); }
  if (ball.y < ball.r)      { ball.y = ball.r; ball.vy = Math.abs(ball.vy) * 0.9; }

  // 網子
  const nl = NET_X - NET_W / 2 - ball.r, nr = NET_X + NET_W / 2 + ball.r;
  if (ball.x > nl && ball.x < nr && ball.y > NET_TOP - ball.r) {
    if (ball.y < NET_TOP + 14 && ball.vy > 0) {
      ball.y = NET_TOP - ball.r; ball.vy = -Math.abs(ball.vy) * 0.75;
      ball.vx += (ball.x < NET_X ? -1 : 1) * 1.2;
    } else {
      if (ball.vx > 0) { ball.x = nl; } else { ball.x = nr; }
      ball.vx *= -0.85;
      beep(520, .05);
    }
  }

  // 玩家碰撞
  for (const p of players) {
    const cx = p.x, cy = p.y - p.r * 0.4;
    const dx = ball.x - cx, dy = ball.y - cy;
    const dist = Math.hypot(dx, dy), minD = p.r + ball.r;
    if (dist < minD && dist > 0.001) {
      const nx = dx / dist, ny = dy / dist;
      ball.x = cx + nx * minD; ball.y = cy + ny * minD;
      const speed = Math.max(8.5, Math.hypot(ball.vx, ball.vy) * 0.85);
      ball.vx = nx * speed * 0.95;
      ball.vy = ny * speed - 4.5 + p.vy * 0.35;
      // 保證往上彈一點,避免貼地死球
      if (ball.vy > -2 && ny < 0.2) ball.vy = -6;
      burst(ball.x, ball.y, "#fff", 6);
      beep(600 + Math.random() * 120, .05, "triangle", .1);
    }
  }

  // 限速
  const sp = Math.hypot(ball.vx, ball.vy);
  if (sp > 17) { ball.vx *= 17 / sp; ball.vy *= 17 / sp; }

  // 落地得分
  if (ball.y >= GROUND - ball.r) {
    const winner = ball.x < NET_X ? 1 : 0;
    score[winner]++;
    pointSide = winner;
    burst(ball.x, GROUND - 10, "#ff7b54", 26);
    shakeT = 12;
    beep(winner === 0 ? 740 : 240, .25, "square", .15);
    if (score[winner] >= WIN_SCORE) {
      state = "over";
    } else {
      state = "point"; pointTimer = 60;
    }
  }
}

// ---------- 粒子 ----------
function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = 2 + Math.random() * 4;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 2, life: 26 + Math.random()*14, color });
  }
}
function stepParticles() {
  for (const pt of particles) { pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.25; pt.life--; }
  particles = particles.filter(pt => pt.life > 0);
}

// ---------- 繪圖 ----------
let skyGrad = null;
function drawBackground() {
  // 天空(每幀完整重繪,消除殘影)
  if (!skyGrad) {
    skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, "#7ec8ff");
    skyGrad.addColorStop(1, "#d8f1ff");
  }
  ctx.fillStyle = skyGrad;
  ctx.fillRect(-20, -20, W + 40, H + 40);
  // 太陽
  ctx.fillStyle = "#fff3b0";
  ctx.beginPath(); ctx.arc(W - 110, 80, 38, 0, 7); ctx.fill();
  ctx.fillStyle = "rgba(255,243,176,.4)";
  ctx.beginPath(); ctx.arc(W - 110, 80, 54, 0, 7); ctx.fill();
  // 雲
  ctx.fillStyle = "rgba(255,255,255,.9)";
  for (const c of clouds) {
    c.x += 0.15 * c.s; if (c.x > W + 80) c.x = -80;
    ctx.beginPath();
    ctx.arc(c.x, c.y, 20*c.s, 0, 7);
    ctx.arc(c.x + 22*c.s, c.y + 4*c.s, 16*c.s, 0, 7);
    ctx.arc(c.x - 22*c.s, c.y + 5*c.s, 15*c.s, 0, 7);
    ctx.fill();
  }
  // 沙地
  ctx.fillStyle = "#f2d98c";
  ctx.fillRect(0, GROUND, W, H - GROUND);
  ctx.fillStyle = "#e0bf66";
  ctx.fillRect(0, GROUND, W, 6);
  // 中線網子
  ctx.fillStyle = "#3a4a63";
  ctx.fillRect(NET_X - NET_W/2, NET_TOP, NET_W, GROUND - NET_TOP);
  ctx.strokeStyle = "rgba(255,255,255,.65)"; ctx.lineWidth = 2;
  for (let y = NET_TOP + 8; y < GROUND; y += 16) {
    ctx.beginPath(); ctx.moveTo(NET_X - NET_W/2, y); ctx.lineTo(NET_X + NET_W/2, y); ctx.stroke();
  }
  ctx.fillStyle = "#fff";
  ctx.fillRect(NET_X - NET_W/2 - 2, NET_TOP - 4, NET_W + 4, 6);
}

function drawMon(p, color1, color2) {
  const x = p.x, y = p.y, r = p.r, f = p.face;
  const squash = p.onGround ? 1 : 0.92;
  ctx.save();
  ctx.translate(x, y - r * squash);
  // 閃電尾巴
  ctx.save();
  ctx.translate(-f * r * 0.85, 6);
  ctx.scale(f, 1);
  ctx.fillStyle = color2;
  ctx.beginPath();
  ctx.moveTo(0, 0); ctx.lineTo(-14, -10); ctx.lineTo(-8, -12);
  ctx.lineTo(-22, -26); ctx.lineTo(-12, -24); ctx.lineTo(-20, -40);
  ctx.lineTo(-2, -20); ctx.lineTo(-8, -18); ctx.lineTo(2, -6);
  ctx.closePath(); ctx.fill();
  ctx.restore();
  // 耳朵
  ctx.fillStyle = color1;
  for (const s of [-1, 1]) {
    ctx.beginPath();
    ctx.moveTo(s * r * 0.45, -r * 0.55);
    ctx.quadraticCurveTo(s * r * 0.95, -r * 1.5, s * r * 0.55, -r * 1.45);
    ctx.quadraticCurveTo(s * r * 0.2, -r * 1.1, s * r * 0.1, -r * 0.7);
    ctx.closePath(); ctx.fill();
  }
  // 身體
  ctx.beginPath();
  ctx.ellipse(0, 0, r, r * squash, 0, 0, 7);
  ctx.fill();
  // 肚子
  ctx.fillStyle = "rgba(255,255,255,.45)";
  ctx.beginPath(); ctx.ellipse(0, r * 0.35, r * 0.55, r * 0.45, 0, 0, 7); ctx.fill();
  // 臉頰
  ctx.fillStyle = "#ff7a3d";
  ctx.beginPath(); ctx.arc(f * r * 0.55 - f*4, r * 0.08, 7.5, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(-f * r * 0.35, r * 0.1, 6, 0, 7); ctx.fill();
  // 眼睛
  ctx.fillStyle = "#23272e";
  ctx.beginPath(); ctx.arc(f * r * 0.32, -r * 0.22, 4.6, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(-f * r * 0.05, -r * 0.2, 4.2, 0, 7); ctx.fill();
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(f * r * 0.34, -r * 0.26, 1.6, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc(-f * r * 0.03, -r * 0.24, 1.4, 0, 7); ctx.fill();
  // 嘴巴
  ctx.strokeStyle = "#23272e"; ctx.lineWidth = 2; ctx.lineCap = "round";
  ctx.beginPath();
  ctx.arc(f * r * 0.16, -r * 0.02, 5, 0.15 * Math.PI, 0.85 * Math.PI);
  ctx.stroke();
  // 扣殺閃光
  if (p.smashFlash > 0) {
    ctx.strokeStyle = "rgba(255,230,60," + (p.smashFlash / 12) + ")";
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(0, 0, r + 10 + (12 - p.smashFlash) * 2, 0, 7); ctx.stroke();
  }
  ctx.restore();
  // 影子
  ctx.fillStyle = "rgba(0,0,0,.15)";
  ctx.beginPath();
  ctx.ellipse(x, GROUND + 8, r * 0.9, 7, 0, 0, 7);
  ctx.fill();
}

function drawBall() {
  // 影子
  const sh = Math.max(0.25, 1 - (GROUND - ball.y) / 360);
  ctx.fillStyle = "rgba(0,0,0," + 0.18 * sh + ")";
  ctx.beginPath(); ctx.ellipse(ball.x, GROUND + 8, ball.r * sh + 6, 5, 0, 0, 7); ctx.fill();
  // 球體(紅白排球)
  ctx.save();
  ctx.translate(ball.x, ball.y);
  ctx.rotate(ball.spin * performance.now() * 0.004 % 6.28);
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.arc(0, 0, ball.r, 0, 7); ctx.fill();
  ctx.fillStyle = "#ff5c5c";
  ctx.beginPath(); ctx.arc(0, 0, ball.r, -0.5, 1.1); ctx.lineTo(0, 0); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.arc(0, 0, ball.r, 2.6, 4.2); ctx.lineTo(0, 0); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = "#d8d8d8"; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(0, 0, ball.r - 0.8, 0, 7); ctx.stroke();
  ctx.restore();
}

function drawScore() {
  ctx.font = "bold 44px 'Trebuchet MS', sans-serif";
  ctx.textAlign = "center";
  ctx.fillStyle = "rgba(35,49,74,.85)";
  ctx.fillText(score[0], W * 0.25, 58);
  ctx.fillText(score[1], W * 0.75, 58);
  ctx.font = "bold 13px sans-serif";
  ctx.fillStyle = "rgba(35,49,74,.6)";
  ctx.fillText(mode === "2P" ? "PLAYER 1" : "YOU", W * 0.25, 78);
  ctx.fillText(mode === "2P" ? "PLAYER 2" : "COM", W * 0.75, 78);
}

function overlay(alpha) {
  ctx.fillStyle = "rgba(20,30,55," + alpha + ")";
  ctx.fillRect(0, 0, W, H);
}

function drawMenu() {
  ctx.clearRect(0, 0, W, H);
  drawBackground(); drawScore();
  drawMon(players[0], "#ffd92e", "#e8a800");
  drawMon(players[1], "#ffb84d", "#e07b00");
  overlay(0.55);
  ctx.textAlign = "center";
  ctx.fillStyle = "#ffd92e";
  ctx.font = "bold 46px 'Trebuchet MS', sans-serif";
  ctx.fillText("⚡ 電氣鼠排球大作戰 ⚡", W/2, 150);
  ctx.fillStyle = "#fff";
  ctx.font = "bold 24px sans-serif";
  ctx.fillText("按 1 ─ 單人(普通)", W/2, 235);
  ctx.fillText("按 2 ─ 單人(困難)", W/2, 275);
  ctx.fillText("按 3 ─ 雙人對戰", W/2, 315);
  ctx.font = "16px sans-serif";
  ctx.fillStyle = "rgba(255,255,255,.75)";
  ctx.fillText("讓球落在對方場地就得分,先拿 15 分獲勝!", W/2, 370);
  ctx.fillText("靠近球時按扣殺鍵,使出強力殺球!", W/2, 396);
  ctx.fillText("遊戲中按 P / Esc 暫停,按 R 重新開始", W/2, 422);
}

function drawGame() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  if (shakeT > 0 && !paused) {
    shakeT--;
    ctx.translate((Math.random()-0.5)*shakeT, (Math.random()-0.5)*shakeT);
  }
  drawBackground();
  drawScore();
  drawMon(players[0], "#ffd92e", "#e8a800");
  drawMon(players[1], "#ffb84d", "#e07b00");
  drawBall();
  for (const pt of particles) {
    ctx.globalAlpha = Math.min(1, pt.life / 20);
    ctx.fillStyle = pt.color;
    ctx.fillRect(pt.x - 2.5, pt.y - 2.5, 5, 5);
  }
  ctx.globalAlpha = 1;

  if (state === "serve") {
    ctx.textAlign = "center";
    ctx.fillStyle = "rgba(35,49,74,.8)";
    ctx.font = "bold 30px sans-serif";
    ctx.fillText("READY...", W/2, 150);
  }
  if (state === "point") {
    ctx.textAlign = "center";
    ctx.fillStyle = pointSide === 0 ? "#1f8a4c" : "#c0392b";
    ctx.font = "bold 38px sans-serif";
    const name = mode === "2P" ? (pointSide === 0 ? "P1" : "P2") : (pointSide === 0 ? "你" : "電腦");
    ctx.fillText(name + " 得分!", W/2, 150);
  }
  if (state === "over") {
    overlay(0.55);
    ctx.textAlign = "center";
    const winner = score[0] > score[1] ? 0 : 1;
    const name = mode === "2P" ? (winner === 0 ? "PLAYER 1" : "PLAYER 2") : (winner === 0 ? "你贏了!" : "電腦獲勝!");
    ctx.fillStyle = "#ffd92e";
    ctx.font = "bold 52px 'Trebuchet MS', sans-serif";
    ctx.fillText(mode === "2P" ? name + " WINS!" : name, W/2, 200);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 26px sans-serif";
    ctx.fillText(score[0] + " : " + score[1], W/2, 250);
    ctx.font = "18px sans-serif";
    ctx.fillText("按 R 再來一局 ・ 按 Enter 或點擊畫面回到選單", W/2, 300);
  }
  ctx.restore();

  if (paused) {
    overlay(0.6);
    ctx.textAlign = "center";
    ctx.fillStyle = "#ffd92e";
    ctx.font = "bold 52px 'Trebuchet MS', sans-serif";
    ctx.fillText("⏸ 暫停中", W/2, 215);
    ctx.fillStyle = "#fff";
    ctx.font = "18px sans-serif";
    ctx.fillText("按 P / Esc 或點擊畫面繼續 ・ 按 R 重新開始", W/2, 262);
  }
}

// ---------- 主迴圈 ----------
function loop() {
  if (state === "menu") {
    drawMenu();
  } else if (paused) {
    drawGame();           // 暫停時只畫面不更新
  } else {
    if (state === "play" || state === "serve") {
      controlHuman(players[0],
        mode === "2P" ? "KeyA" : "ArrowLeft",
        mode === "2P" ? "KeyD" : "ArrowRight",
        mode === "2P" ? "KeyW" : "ArrowUp",
        mode === "2P" ? "KeyG" : null);
      if (mode === "2P") {
        controlHuman(players[1], "ArrowLeft", "ArrowRight", "ArrowUp", "KeyL");
      } else {
        // 單人:Space 或 Z 都能扣殺
        if ((keys.Space || keys.KeyZ) && players[0].hitCooldown <= 0) tryPowerHit(players[0]);
        controlAI(players[1]);
      }
      // 2P 模式 P1 的扣殺鍵
      if (mode === "2P" && keys.KeyG && players[0].hitCooldown <= 0) tryPowerHit(players[0]);
    }
    physics();
    stepParticles();
    if (state === "point") {
      pointTimer--;
      if (pointTimer <= 0) { resetRally(1 - pointSide); state = "serve"; }
    }
    drawGame();
  }
  requestAnimationFrame(loop);
}
loop();
</script>
