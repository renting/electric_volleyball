<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>電氣鼠排球大作戰</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;padding:16px;
    background:linear-gradient(180deg,#1b2a4a 0%,#27406e 100%);
    font-family:"Trebuchet MS","Microsoft JhengHei",sans-serif;color:#fff;
  }
  h1{font-size:clamp(20px,4vw,34px);letter-spacing:2px;text-shadow:0 3px 0 rgba(0,0,0,.35);}
  h1 .bolt{color:#ffb800;}
  #wrap{position:relative;width:min(96vw,920px);}
  #wrap canvas{display:block;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.45);}
  #hint{font-size:13px;line-height:1.7;opacity:.85;text-align:center;max-width:760px;}
  kbd{
    background:#fff;color:#23314a;border-radius:5px;padding:1px 7px;
    font-family:inherit;font-weight:bold;box-shadow:0 2px 0 rgba(0,0,0,.3);font-size:12px;
  }

  /* ── 行動裝置觸控版面（僅 body.touch 生效，桌面外觀不變）── */
  body.touch h1, body.touch #hint{ display:none; }
  @media (orientation:landscape){
    body.touch{ padding:0; gap:0; }
    body.touch #wrap{ width:100vw; height:100vh; max-width:none; }
  }
  #wrap canvas{ position:relative; z-index:1; }

  /* 觸控操作面板 overlay */
  #touchPanel{ position:absolute; inset:0; z-index:5; pointer-events:none; }
  #touchPanel.hidden{ display:none; }
  #stick{
    position:absolute; left:max(20px,env(safe-area-inset-left));
    bottom:max(20px,env(safe-area-inset-bottom));
    width:148px; height:148px; border-radius:50%;
    background:rgba(255,255,255,.16); box-shadow:inset 0 0 0 2px rgba(255,255,255,.22);
    pointer-events:auto; touch-action:none;
    user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent;
  }
  #stickKnob{
    position:absolute; left:50%; top:50%; width:66px; height:66px; margin:-33px 0 0 -33px;
    border-radius:50%; background:rgba(255,255,255,.4); box-shadow:0 2px 8px rgba(0,0,0,.3);
    will-change:transform; pointer-events:none;
  }
  #padRight{
    position:absolute; right:max(16px,env(safe-area-inset-right));
    bottom:max(16px,env(safe-area-inset-bottom));
  }
  .tbtn{
    pointer-events:auto; touch-action:none;
    user-select:none; -webkit-user-select:none; -webkit-tap-highlight-color:transparent;
    width:64px; height:64px; border-radius:50%; border:none;
    background:rgba(255,255,255,.28); color:#fff; font-size:26px; font-weight:bold;
    box-shadow:0 2px 8px rgba(0,0,0,.3); line-height:1;
  }
  .tbtn.active{ background:rgba(255,216,46,.6); }
  .tbtn-hit{ width:96px; height:96px; font-size:24px; background:rgba(255,123,84,.45); }

  /* 橫向閘門提示 */
  #rotateNotice{
    position:fixed; inset:0; z-index:50;
    display:flex; align-items:center; justify-content:center;
    background:rgba(20,33,62,.94); color:#fff;
    font-size:clamp(18px,5vw,26px); text-align:center; padding:24px; line-height:1.6;
  }
  #rotateNotice.hidden{ display:none; }
</style>
</head>
<body>
<h1>⚡ 電氣鼠排球大作戰 <span class="bolt">PIKA VOLLEY</span> ⚡</h1>
<div id="wrap">
  <div id="touchPanel" class="hidden" aria-hidden="true">
    <div id="stick" aria-label="移動搖桿（左右移動，上推跳躍）"><div id="stickKnob"></div></div>
    <div id="padRight">
      <button class="tbtn tbtn-hit" type="button" data-key="hit" aria-label="扣殺或撲球">扣殺</button>
    </div>
  </div>
</div>
<div id="rotateNotice" class="hidden">📱 ↻<br>請將手機轉為橫向以開始遊玩</div>
<div id="hint">
  單人:<kbd>←</kbd><kbd>→</kbd> 移動 <kbd>↑</kbd> 跳躍 <kbd>Space</kbd>/<kbd>Z</kbd> 強力扣殺&nbsp;&nbsp;|&nbsp;&nbsp;
  雙人:P1 <kbd>A</kbd><kbd>D</kbd><kbd>W</kbd> + <kbd>G</kbd> 扣殺,P2 用方向鍵 + <kbd>L</kbd> 扣殺。<br>
  撲球:球不在身邊時 扣殺鍵 + 左右方向鍵 撲救（1P <kbd>Space</kbd>/<kbd>Z</kbd> + <kbd>←</kbd>/<kbd>→</kbd>,P1 <kbd>G</kbd> + <kbd>A</kbd>/<kbd>D</kbd>,P2 <kbd>L</kbd> + <kbd>←</kbd>/<kbd>→</kbd>)<br>
  <kbd>P</kbd>/<kbd>Esc</kbd> 暫停 ・ <kbd>R</kbd> 重新開始 ・ 先得 15 分獲勝!
</div>
<script>
"use strict";

// ── 常數 ──────────────────────────────────────────────────────────
const W = 900, H = 500;
const GROUND = H - 46;
const NET_X = W / 2, NET_W = 10, NET_TOP = GROUND - 170;
const WIN_SCORE = 15;
const DIVE_TIME = 14, DIVE_SPD = 9, DIVE_RECOVER = 16;

// ── 觸控偵測與輸入狀態 ─────────────────────────────────────────────
// isTouchDevice：以 pointer:coarse 為主、ontouchstart 為輔，不靠 UA 字串。
function isTouchDevice() {
  return (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) ||
         ('ontouchstart' in window);
}
// 模組級觸控輸入狀態：由虛擬按鈕更新，GameScene 每幀讀取後與鍵盤 OR 合併。
const touchInput = { left: false, right: false, up: false, hit: false };

// ── 音效 ──────────────────────────────────────────────────────────
let actx = null;
function beep(freq, dur = 0.07, type = "square", vol = 0.12) {
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + dur);
  } catch(e) {}
}

// ── 遊戲物件 ──────────────────────────────────────────────────────
function makePlayer(side) {
  return {
    side, r: 34,
    x: side === 0 ? W * 0.25 : W * 0.75,
    y: GROUND, vy: 0,
    onGround: true,
    hitCooldown: 0, smashFlash: 0,
    diveT: 0, diveRecover: 0, diveDir: side === 0 ? 1 : -1,
    face: side === 0 ? 1 : -1,
    aiHitDelay: 0,
    texture: null,
    color1: side === 0 ? 0xffd92e : 0xffb84d,
    color2: side === 0 ? 0xe8a800 : 0xe07b00
  };
}

// ── 顏色工具 ──────────────────────────────────────────────────────
function lerpColor(c1, c2, t) {
  const r1=(c1>>16)&0xff, g1=(c1>>8)&0xff, b1=c1&0xff;
  const r2=(c2>>16)&0xff, g2=(c2>>8)&0xff, b2=c2&0xff;
  return (Math.round(r1+(r2-r1)*t)<<16)|(Math.round(g1+(g2-g1)*t)<<8)|Math.round(b1+(b2-b1)*t);
}

// 二次 Bezier 曲線折線近似
function qBez(x0,y0,cx,cy,x1,y1,n=8) {
  const pts=[];
  for(let i=0;i<=n;i++){
    const t=i/n, u=1-t;
    pts.push({x:u*u*x0+2*u*t*cx+t*t*x1, y:u*u*y0+2*u*t*cy+t*t*y1});
  }
  return pts;
}

// ── 背景繪製（MenuScene / GameScene 共用）─────────────────────────
function drawBackground(g, clouds) {
  // 天空漸層
  const SKY_TOP = 0x7ec8ff, SKY_BOT = 0xd8f1ff;
  const strips = 20, sh = GROUND / strips;
  for(let i=0;i<strips;i++){
    g.fillStyle(lerpColor(SKY_TOP, SKY_BOT, i/(strips-1)), 1);
    g.fillRect(0, i*sh, W, sh+1);
  }
  // 太陽
  g.fillStyle(0xfff3b0, 1); g.fillCircle(W-110, 80, 38);
  g.fillStyle(0xfff3b0, 0.4); g.fillCircle(W-110, 80, 54);
  // 雲
  for(const c of clouds){
    c.x += 0.15*c.s; if(c.x > W+80) c.x = -80;
    g.fillStyle(0xffffff, 0.9);
    g.fillCircle(c.x,         c.y,       20*c.s);
    g.fillCircle(c.x+22*c.s,  c.y+4*c.s, 16*c.s);
    g.fillCircle(c.x-22*c.s,  c.y+5*c.s, 15*c.s);
  }
  // 沙地
  g.fillStyle(0xf2d98c, 1); g.fillRect(0, GROUND, W, H-GROUND);
  g.fillStyle(0xe0bf66, 1); g.fillRect(0, GROUND, W, 6);
  // 網子
  g.fillStyle(0x3a4a63, 1); g.fillRect(NET_X-NET_W/2, NET_TOP, NET_W, GROUND-NET_TOP);
  g.lineStyle(2, 0xffffff, 0.65);
  for(let yy=NET_TOP+8; yy<GROUND; yy+=16){
    g.beginPath(); g.moveTo(NET_X-NET_W/2, yy); g.lineTo(NET_X+NET_W/2, yy); g.strokePath();
  }
  g.fillStyle(0xffffff, 1); g.fillRect(NET_X-NET_W/2-2, NET_TOP-4, NET_W+4, 6);
}

// ── renderPlayer / drawMonGraphics ────────────────────────────────
function renderPlayer(g, player) {
  if (player.texture) {
    // 未來：player.sprite.setPosition(player.x, player.y)
    return;
  }
  drawMonGraphics(g, player);
}

function drawMonGraphics(g, player) {
  const {x, y, r, onGround, smashFlash, color1, color2} = player;
  const squash = onGround ? 1 : 0.92;

  // ── 形變參數（hs 水平、vs 垂直）與身體中心（bx, by）──
  // 非撲球狀態：hs=1, vs=1, (bx,by)=(x, y-r*squash)，與原版完全一致。
  let f = player.face;
  let hs = 1, vs = 1;
  let bx = x, by = y - r * squash;
  if (player.diveT > 0) {
    // 位移階段：固定撲球姿態（水平 ×1.6、垂直 ×0.5、貼地）
    f = player.diveDir;
    hs = 1.6; vs = 0.5;
    bx = x + player.diveDir * r * 0.45;
    by = GROUND - r * 0.55;
  } else if (player.diveRecover > 0) {
    // 起身階段：以 t=diveRecover/DIVE_RECOVER（1→0）線性插值回站姿
    f = player.diveDir;
    const t = player.diveRecover / DIVE_RECOVER;
    hs = 1 + 0.6 * t;
    vs = 1 - 0.5 * t;
    bx = x + player.diveDir * r * 0.45 * t;
    by = (GROUND - r) + r * 0.45 * t;
  }

  // 投影（寬度隨水平延伸同步加寬）
  g.fillStyle(0x000000, 0.15);
  g.fillEllipse(bx, GROUND+8, r*1.8*hs, 14);

  // 閃電尾巴
  const tx=bx-f*r*0.85*hs, ty=by+6*vs;
  g.fillStyle(color2, 1);
  const tail=[
    {x:tx,           y:ty},
    {x:tx-f*14*hs,   y:ty-10*vs},
    {x:tx-f*8*hs,    y:ty-12*vs},
    {x:tx-f*22*hs,   y:ty-26*vs},
    {x:tx-f*12*hs,   y:ty-24*vs},
    {x:tx-f*20*hs,   y:ty-40*vs},
    {x:tx-f*2*hs,    y:ty-20*vs},
    {x:tx-f*8*hs,    y:ty-18*vs},
    {x:tx+f*2*hs,    y:ty-6*vs}
  ];
  g.beginPath(); g.moveTo(tail[0].x, tail[0].y);
  for(let i=1;i<tail.length;i++) g.lineTo(tail[i].x, tail[i].y);
  g.closePath(); g.fillPath();

  // 耳朵
  g.fillStyle(color1, 1);
  for(const s of [-1,1]){
    const pts1 = qBez(bx+s*r*0.45*hs, by-r*0.55*vs, bx+s*r*0.95*hs, by-r*1.5*vs,  bx+s*r*0.55*hs, by-r*1.45*vs);
    const pts2 = qBez(bx+s*r*0.55*hs, by-r*1.45*vs, bx+s*r*0.2*hs,  by-r*1.1*vs,  bx+s*r*0.1*hs,  by-r*0.7*vs);
    g.beginPath(); g.moveTo(pts1[0].x, pts1[0].y);
    pts1.forEach(p=>g.lineTo(p.x,p.y));
    pts2.slice(1).forEach(p=>g.lineTo(p.x,p.y));
    g.closePath(); g.fillPath();
  }

  // 身體
  g.fillStyle(color1, 1);
  g.fillEllipse(bx, by, r*2*hs, r*2*squash*vs);

  // 肚子
  g.fillStyle(0xffffff, 0.45);
  g.fillEllipse(bx, by+r*0.35*vs, r*1.1*hs, r*0.9*vs);

  // 臉頰
  g.fillStyle(0xff7a3d, 1);
  g.fillCircle(bx+(f*r*0.55-f*4)*hs, by+r*0.08*vs, 7.5);
  g.fillCircle(bx-f*r*0.35*hs,       by+r*0.1*vs,  6);

  // 眼睛
  g.fillStyle(0x23272e, 1);
  g.fillCircle(bx+f*r*0.32*hs,  by-r*0.22*vs, 4.6);
  g.fillCircle(bx-f*r*0.05*hs,  by-r*0.2*vs,  4.2);
  g.fillStyle(0xffffff, 1);
  g.fillCircle(bx+f*r*0.34*hs,  by-r*0.26*vs, 1.6);
  g.fillCircle(bx-f*r*0.03*hs,  by-r*0.24*vs, 1.4);

  // 嘴巴
  g.lineStyle(2, 0x23272e, 1);
  g.beginPath();
  g.arc(bx+f*r*0.16*hs, by-r*0.02*vs, 5, 0.15*Math.PI, 0.85*Math.PI, false);
  g.strokePath();

  // 扣殺閃光
  if(smashFlash > 0){
    g.lineStyle(4, 0xffe63c, smashFlash/12);
    g.strokeCircle(bx, by, r+10+(12-smashFlash)*2);
  }
}

// ── MenuScene ─────────────────────────────────────────────────────
class MenuScene extends Phaser.Scene {
  constructor(){ super({ key: 'Menu' }); }

  create(){
    this.gfx    = this.add.graphics();
    this.clouds = [{x:120,y:70,s:1},{x:420,y:110,s:.7},{x:700,y:60,s:1.2},{x:830,y:140,s:.6}];
    this.staticPlayers = [makePlayer(0), makePlayer(1)];

    const TS = (txt, x, y, size, color, bold=true) =>
      this.add.text(x, y, txt, {
        fontFamily: "'Trebuchet MS',sans-serif", fontSize: size+'px',
        fontStyle: bold?'bold':'normal', color, align:'center'
      }).setOrigin(0.5);

    TS('⚡ 電氣鼠排球大作戰 ⚡',   W/2, 150, 40, '#ffd92e');

    // 鍵盤始終可用（桌面）；觸控裝置不會觸發這些事件。
    this.input.keyboard.on('keydown-ONE',   ()=>this._start('1P','normal'));
    this.input.keyboard.on('keydown-TWO',   ()=>this._start('1P','hard'));
    this.input.keyboard.on('keydown-THREE', ()=>this._start('2P', null));

    if (isTouchDevice()) {
      // 觸控：僅單人兩選項，可點擊；不顯示 2P 與鍵盤說明。
      const o1 = TS('▶ 單人（普通）', W/2, 250, 30, '#ffffff');
      const o2 = TS('▶ 單人（困難）', W/2, 305, 30, '#ffffff');
      o1.setInteractive({ useHandCursor:true }).on('pointerdown', ()=>this._start('1P','normal'));
      o2.setInteractive({ useHandCursor:true }).on('pointerdown', ()=>this._start('1P','hard'));
      TS('讓球落在對方場地就得分，先拿 15 分獲勝！',           W/2, 375, 16, '#ccddff', false);
      TS('搖桿左右移動、上推跳躍；靠近球按扣殺鈕強殺，球遠離時 搖桿方向 + 扣殺鈕 撲救！', W/2, 408, 13, '#ccddff', false);
      TS('點選上方選項開始遊戲',                              W/2, 440, 16, '#ccddff', false);
    } else {
      TS('按 1 ─ 單人（普通）',       W/2, 235, 24, '#ffffff');
      TS('按 2 ─ 單人（困難）',       W/2, 275, 24, '#ffffff');
      TS('按 3 ─ 雙人對戰',           W/2, 315, 24, '#ffffff');
      TS('讓球落在對方場地就得分，先拿 15 分獲勝！', W/2, 370, 16, '#ccddff', false);
      TS('靠近球時按扣殺鍵，使出強力殺球！',        W/2, 392, 16, '#ccddff', false);
      TS('球不在身邊時，扣殺鍵 + 左右方向鍵 可撲球救球！', W/2, 416, 16, '#ccddff', false);
      TS('遊戲中按 P / Esc 暫停，按 R 重新開始',   W/2, 440, 16, '#ccddff', false);
      this.input.on('pointerdown',            ()=>this._start('1P','normal'));
    }
  }

  _start(mode, aiLevel){
    beep(660,.1,'triangle'); beep(880,.12,'triangle');
    this.scene.start('Game', { mode, aiLevel });
  }

  update(){
    const g = this.gfx;
    g.clear();
    drawBackground(g, this.clouds);
    renderPlayer(g, this.staticPlayers[0]);
    renderPlayer(g, this.staticPlayers[1]);
    g.fillStyle(0x14213e, 0.55);
    g.fillRect(0, 0, W, H);
  }
}

// ── GameScene ─────────────────────────────────────────────────────
class GameScene extends Phaser.Scene {
  constructor(){ super({ key: 'Game' }); }

  create(){
    const data     = this.scene.settings.data || {};
    this.mode      = data.mode    || '1P';
    this.aiLevel   = data.aiLevel || 'normal';
    this.score     = [0, 0];
    this.state     = 'serve';
    this.paused    = false;
    this.particles = [];
    this.clouds    = [{x:120,y:70,s:1},{x:420,y:110,s:.7},{x:700,y:60,s:1.2},{x:830,y:140,s:.6}];
    this.players   = [makePlayer(0), makePlayer(1)];
    this.ball      = { x:0, y:0, vx:0, vy:0, r:28, spin:0, trail:[], smash:0 };
    this.serveTimer = 0; this.pointTimer = 0; this.pointSide = 0;

    this._resetRally(Math.random() < 0.5 ? 0 : 1);

    // Graphics（在所有 Text 之前加入，確保 Text 疊在上方）
    this.gfx         = this.add.graphics();
    this.overlayGfx  = this.add.graphics();

    // 分數文字
    const TS = (t,x,y,sz,col,bold=true)=>
      this.add.text(x,y,t,{fontFamily:"'Trebuchet MS',sans-serif",fontSize:sz+'px',fontStyle:bold?'bold':'normal',color:col,align:'center'}).setOrigin(0.5);

    this.scoreTxt = [
      TS('0', W*0.25, 40, 44, '#23314a'),
      TS('0', W*0.75, 40, 44, '#23314a')
    ];
    TS(this.mode==='2P'?'PLAYER 1':'YOU', W*0.25, 68, 13, '#23314a');
    TS(this.mode==='2P'?'PLAYER 2':'COM', W*0.75, 68, 13, '#23314a');

    // 狀態文字
    this.readyTxt = TS('READY...',  W/2, 150, 30, '#23314a').setVisible(false);
    this.pointTxt = TS('',          W/2, 150, 38, '#1f8a4c').setVisible(false);
    this.overTitle= TS('',          W/2, 200, 52, '#ffd92e').setVisible(false);
    this.overScore= TS('',          W/2, 255, 26, '#ffffff').setVisible(false);
    this.overHint = TS('按 R 再來一局 ・ 按 Enter 或點擊畫面回到選單', W/2, 300, 18, '#ffffff', false).setVisible(false);
    this.pauseTitle= TS('⏸ 暫停中', W/2, 215, 52, '#ffd92e').setVisible(false);
    this.pauseHint = TS('按 P / Esc 或點擊畫面繼續 ・ 按 R 重新開始', W/2, 262, 18, '#ffffff', false).setVisible(false);

    // 鍵盤
    const KC = Phaser.Input.Keyboard.KeyCodes;
    this.kbd = this.input.keyboard.addKeys({
      left:KC.LEFT, right:KC.RIGHT, up:KC.UP,
      a:KC.A, d:KC.D, w:KC.W, g:KC.G, l:KC.L,
      space:KC.SPACE, z:KC.Z,
      p:KC.P, esc:KC.ESC, r:KC.R, enter:KC.ENTER
    });
    this.input.keyboard.addCapture([KC.SPACE,KC.UP,KC.DOWN,KC.LEFT,KC.RIGHT]);

    this.input.keyboard.on('keydown-P',   ()=>this._togglePause());
    this.input.keyboard.on('keydown-ESC', ()=>this._togglePause());
    this.input.keyboard.on('keydown-R',   ()=>this._restart());
    this.input.keyboard.on('keydown-ENTER',()=>{ if(this.state==='over') this.scene.start('Menu'); });
    this.input.on('pointerdown',()=>{
      if(this.state==='over')    this.scene.start('Menu');
      else if(this.paused)       this._togglePause();
    });
  }

  _togglePause(){
    if(this.state==='over') return;
    this.paused = !this.paused;
    beep(this.paused?300:520, .08, 'triangle');
  }

  _restart(){
    this.scene.restart({ mode: this.mode, aiLevel: this.aiLevel });
  }

  _resetRally(side){
    this.players[0].x = W*0.25; this.players[1].x = W*0.75;
    this.players.forEach(p=>{ p.y=GROUND; p.vy=0; p.onGround=true; p.diveT=0; p.diveRecover=0; });
    this.ball.x = side===0 ? W*0.25 : W*0.75;
    this.ball.y=110; this.ball.vx=0; this.ball.vy=0; this.ball.spin=0;
    this.ball.trail.length=0; this.ball.smash=0;
    this.serveTimer=50;
  }

  _burst(x,y,color,n){
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, s=2+Math.random()*4;
      this.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:26+Math.random()*14,color});
    }
  }

  _inHitRange(p){
    const dx=this.ball.x-p.x, dy=this.ball.y-(p.y-p.r*0.4);
    return Math.hypot(dx,dy) < p.r+this.ball.r+24;
  }

  _tryPowerHit(p){
    if(this._inHitRange(p)){
      const dir=p.side===0?1:-1;
      const aimDown=this.ball.y<NET_TOP+30?0.85:0.25;
      this.ball.vx=dir*(11+Math.random()*3);
      this.ball.vy=-3+aimDown*12*Math.random()+(this.ball.y<NET_TOP?6:-6);
      this.ball.spin=dir*0.5;
      p.hitCooldown=18; p.smashFlash=12;
      this.ball.smash=26;   // 觸發彗星殘影
      this.cameras.main.shake(133, 0.005);
      this._burst(this.ball.x, this.ball.y, 0xffd92e, 14);
      beep(180,.12,'sawtooth',.18); beep(90,.15,'square',.12);
    } else {
      p.hitCooldown=10;
    }
  }

  _predictBallX(){
    let x=this.ball.x, y=this.ball.y, vx=this.ball.vx, vy=this.ball.vy;
    for(let i=0;i<200;i++){
      vy+=0.42; x+=vx; y+=vy;
      if(x<this.ball.r||x>W-this.ball.r) vx*=-1;
      if(y>=GROUND-this.ball.r) break;
    }
    return x;
  }

  // 統一輸入狀態：鍵盤 Key 物件與 touchInput 以邏輯 OR 合併，
  // 供 1P 控制路徑使用。觸控與鍵盤共用同一條 _controlHuman 與三向分流。
  _p1Input(){
    return {
      left:  { isDown: this.kbd.left.isDown  || touchInput.left },
      right: { isDown: this.kbd.right.isDown || touchInput.right },
      up:    { isDown: this.kbd.up.isDown    || touchInput.up },
      hit:   { isDown: this.kbd.space.isDown || this.kbd.z.isDown || touchInput.hit }
    };
  }

  _controlHuman(p,left,right,up,hit){
    // 撲球位移／起身硬直期間輸入鎖定
    if(p.diveT>0 || p.diveRecover>0) return;
    const SPD=5.4;
    if(left.isDown)  { p.x-=SPD; p.face=-1; }
    if(right.isDown) { p.x+=SPD; p.face=1; }
    if(up.isDown && p.onGround){ p.vy=-13.5; p.onGround=false; beep(330,.05,'sine',.06); }
    if(hit && hit.isDown && p.hitCooldown<=0){
      // 恰好按住一個左右方向鍵（同時按住左右視為無方向）
      const dirHeld = (left.isDown===right.isDown) ? 0 : (left.isDown ? -1 : 1);
      if(this._inHitRange(p))                                          this._tryPowerHit(p);
      else if(this.state==='play' && p.onGround && dirHeld!==0)        this._startDive(p, dirHeld);
      else                                                             p.hitCooldown=10;
    }
  }

  _startDive(p, dir){
    p.diveT=DIVE_TIME; p.diveDir=dir; p.face=dir;
    beep(300,.07,'square',.12);
    this._burst(p.x, GROUND-4, 0xe0bf66, 8);
  }

  _controlAI(p){
    const SPD=this.aiLevel==='hard'?5.6:4.6;
    const onMySide=this.ball.x>NET_X;
    let target=onMySide?this._predictBallX():W*0.75;
    target=Math.max(NET_X+p.r+14, Math.min(W-p.r, target));
    if(Math.abs(p.x-target)>(this.aiLevel==='hard'?4:14)){
      p.x+=p.x<target?SPD:-SPD;
      p.face=this.ball.x<p.x?-1:1;
    }
    const dx=this.ball.x-p.x, dy=this.ball.y-(p.y-p.r);
    if(p.onGround&&onMySide&&Math.abs(dx)<70&&dy<0&&dy>-190&&this.ball.vy>-2){
      p.vy=-13.5; p.onGround=false;
    }
    const dist=Math.hypot(this.ball.x-p.x, this.ball.y-(p.y-p.r*0.4));
    if(dist<p.r+this.ball.r+26&&p.hitCooldown<=0){
      p.aiHitDelay--;
      if(p.aiHitDelay<=0){
        if(Math.random()<(this.aiLevel==='hard'?0.7:0.4)) this._tryPowerHit(p);
        p.aiHitDelay=6;
      }
    }
  }

  _updatePhysics(){
    const b=this.ball;
    // 玩家
    for(const p of this.players){
      p.vy+=0.7; p.y+=p.vy;
      if(p.y>=GROUND){ p.y=GROUND; p.vy=0; p.onGround=true; }
      // 撲球位移與起身硬直步進
      if(p.diveT>0){
        p.x += p.diveDir*DIVE_SPD;
        if(--p.diveT<=0) p.diveRecover=DIVE_RECOVER;
      } else if(p.diveRecover>0){
        p.diveRecover--;
      }
      const minX=p.side===0?p.r:NET_X+NET_W/2+p.r;
      const maxX=p.side===0?NET_X-NET_W/2-p.r:W-p.r;
      p.x=Math.max(minX, Math.min(maxX,p.x));
      if(p.hitCooldown>0) p.hitCooldown--;
      if(p.smashFlash>0)  p.smashFlash--;
    }

    if(this.state==='serve'){ if(--this.serveTimer<=0) this.state='play'; return; }
    if(this.state!=='play') return;

    // 球
    b.vy+=0.42; b.x+=b.vx; b.y+=b.vy; b.spin*=0.99;
    // 彗星殘影軌跡：記錄近期球心位置
    b.trail.push({x:b.x, y:b.y});
    if(b.trail.length>16) b.trail.shift();
    if(b.smash>0) b.smash--;

    if(b.x<b.r)    { b.x=b.r;   b.vx=Math.abs(b.vx)*0.9;  beep(440,.04); }
    if(b.x>W-b.r)  { b.x=W-b.r; b.vx=-Math.abs(b.vx)*0.9; beep(440,.04); }
    if(b.y<b.r)    { b.y=b.r;   b.vy=Math.abs(b.vy)*0.9; }

    // 網子
    const nl=NET_X-NET_W/2-b.r, nr=NET_X+NET_W/2+b.r;
    if(b.x>nl&&b.x<nr&&b.y>NET_TOP-b.r){
      if(b.y<NET_TOP+14&&b.vy>0){
        b.y=NET_TOP-b.r; b.vy=-Math.abs(b.vy)*0.75;
        b.vx+=(b.x<NET_X?-1:1)*1.2;
      } else {
        b.x=b.vx>0?nl:nr; b.vx*=-0.85; beep(520,.05);
      }
    }

    // 玩家碰撞
    for(const p of this.players){
      const diving = p.diveT>0 || p.diveRecover>0;
      // 單次觸球閘門：撲球狀態下 hitCooldown>0（墊球後）不再與球碰撞
      if(diving && p.hitCooldown>0) continue;
      // 自己半場限制：撲球判定區僅對球心在自己半場的球生效，否則改用站立判定圓
      const ballOwnSide = p.side===0 ? b.x<NET_X : b.x>NET_X;
      const useDive = diving && ballOwnSide;
      const cx = useDive ? p.x + p.diveDir*p.r*0.7 : p.x;
      const cy = useDive ? p.y - p.r*0.5           : p.y - p.r*0.4;
      const dx=b.x-cx, dy=b.y-cy;
      const dist=Math.hypot(dx,dy), minD=p.r+b.r;
      if(dist<minD&&dist>0.001){
        const nx=dx/dist, ny=dy/dist;
        b.x=cx+nx*minD; b.y=cy+ny*minD;
        if(useDive && p.diveT>0){
          // 位移階段墊球回擊：固定高彈起、水平大幅減弱
          if(b.y>GROUND-b.r-1) b.y=GROUND-b.r-1;   // 墊球優先於同幀落地判定
          b.vy=-11;
          b.vx=p.diveDir*3 + b.vx*0.25;
          b.spin=p.diveDir*0.25;
          p.smashFlash=8;
          p.diveT=0; p.diveRecover=DIVE_RECOVER; p.hitCooldown=DIVE_RECOVER;
          this._burst(b.x,b.y,0xfff3b0,10);
          beep(480,.08,'triangle',.12);
        } else {
          // 一般碰撞速度轉移（站立、起身硬直自然結束、對側球皆適用）
          const speed=Math.max(8.5, Math.hypot(b.vx,b.vy)*0.85);
          b.vx=nx*speed*0.95; b.vy=ny*speed-4.5+p.vy*0.35;
          if(b.vy>-2&&ny<0.2) b.vy=-6;
          this._burst(b.x,b.y,0xffffff,6);
          beep(600+Math.random()*120,.05,'triangle',.1);
        }
      }
    }

    const sp=Math.hypot(b.vx,b.vy);
    if(sp>17){ b.vx*=17/sp; b.vy*=17/sp; }

    // 落地得分
    if(b.y>=GROUND-b.r){
      const winner=b.x<NET_X?1:0;
      this.score[winner]++;
      this.scoreTxt[winner].setText(String(this.score[winner]));
      this.pointSide=winner;
      this._burst(b.x,GROUND-10,0xff7b54,26);
      this.cameras.main.shake(200,0.007);
      beep(winner===0?740:240,.25,'square',.15);
      this.state = this.score[winner]>=WIN_SCORE ? 'over' : 'point';
      if(this.state==='point') this.pointTimer=60;
    }
  }

  update(){
    // 暫停
    if(this.paused){
      this.overlayGfx.clear();
      this.overlayGfx.fillStyle(0x14213e,0.6); this.overlayGfx.fillRect(0,0,W,H);
      this.pauseTitle.setVisible(true); this.pauseHint.setVisible(true);
      this.readyTxt.setVisible(false);  this.pointTxt.setVisible(false);
      return;
    }
    this.pauseTitle.setVisible(false); this.pauseHint.setVisible(false);

    // 控制
    if(this.state==='play'||this.state==='serve'){
      if(this.mode==='2P'){
        this._controlHuman(this.players[0], this.kbd.a, this.kbd.d, this.kbd.w, this.kbd.g);
        this._controlHuman(this.players[1], this.kbd.left, this.kbd.right, this.kbd.up, this.kbd.l);
      } else {
        const inp = this._p1Input();
        this._controlHuman(this.players[0], inp.left, inp.right, inp.up, inp.hit);
        this._controlAI(this.players[1]);
      }
    }

    this._updatePhysics();

    // 粒子步進
    for(const pt of this.particles){ pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.25; pt.life--; }
    this.particles=this.particles.filter(pt=>pt.life>0);

    // Point 計時
    if(this.state==='point'){ if(--this.pointTimer<=0){ this._resetRally(1-this.pointSide); this.state='serve'; } }

    // ── 繪圖 ──
    const g=this.gfx;
    g.clear();
    drawBackground(g, this.clouds);
    renderPlayer(g, this.players[0]);
    renderPlayer(g, this.players[1]);

    // 球
    const b=this.ball;
    const sh=Math.max(0.25, 1-(GROUND-b.y)/360);
    g.fillStyle(0x000000, 0.18*sh);
    g.fillEllipse(b.x, GROUND+8, (b.r*sh+6)*2, 10);
    // 彗星殘影：扣殺時最明顯（黃→橘漸層），高速飛行時亦淡淡拖尾
    const bspd=Math.hypot(b.vx,b.vy);
    const strength=b.smash>0 ? 1 : Math.max(0, Math.min(1, (bspd-7)/8));
    if(strength>0.12 && b.trail.length>1){
      const n=b.trail.length;
      for(let i=0;i<n-1;i++){
        const t=i/(n-1);                       // 0=最舊（尾）→1=最新（頭）
        const p=b.trail[i];
        const col=b.smash>0 ? lerpColor(0xffe98a, 0xff6a2e, t) : 0xfff3b0;
        g.fillStyle(col, strength*0.55*t);
        g.fillCircle(p.x, p.y, b.r*(0.3+0.65*t));
      }
    }
    g.fillStyle(0xffffff,1); g.fillCircle(b.x,b.y,b.r);
    const ba=b.spin*this.time.now*0.004;
    g.fillStyle(0xff5c5c,1);
    g.beginPath(); g.moveTo(b.x,b.y); g.arc(b.x,b.y,b.r,ba-0.5,ba+1.1,false); g.closePath(); g.fillPath();
    g.beginPath(); g.moveTo(b.x,b.y); g.arc(b.x,b.y,b.r,ba+2.6,ba+4.2,false); g.closePath(); g.fillPath();
    g.lineStyle(1.5,0xd8d8d8,1); g.strokeCircle(b.x,b.y,b.r-0.8);

    // 粒子
    for(const pt of this.particles){
      g.fillStyle(pt.color, Math.min(1,pt.life/20));
      g.fillRect(pt.x-2.5, pt.y-2.5, 5, 5);
    }

    // 狀態文字
    this.readyTxt.setVisible(this.state==='serve');

    if(this.state==='point'){
      const nm=this.mode==='2P'?(this.pointSide===0?'P1':'P2'):(this.pointSide===0?'你':'電腦');
      this.pointTxt.setText(nm+' 得分！').setColor(this.pointSide===0?'#1f8a4c':'#c0392b').setVisible(true);
    } else if(this.state!=='over') {
      this.pointTxt.setVisible(false);
    }

    // 遊戲結束
    this.overlayGfx.clear();
    if(this.state==='over'){
      this.overlayGfx.fillStyle(0x14213e,0.55); this.overlayGfx.fillRect(0,0,W,H);
      const w=this.score[0]>this.score[1]?0:1;
      const nm=this.mode==='2P'?(w===0?'PLAYER 1 WINS!':'PLAYER 2 WINS!'):(w===0?'你贏了！':'電腦獲勝！');
      this.overTitle.setText(nm).setVisible(true);
      this.overScore.setText(this.score[0]+' : '+this.score[1]).setVisible(true);
      this.overHint.setVisible(true);
      this.pointTxt.setVisible(false);
    } else {
      this.overTitle.setVisible(false);
      this.overScore.setVisible(false);
      this.overHint.setVisible(false);
    }
  }
}

// ── Phaser.Game ───────────────────────────────────────────────────
new Phaser.Game({
  type: Phaser.AUTO,
  parent: 'wrap',
  backgroundColor: '#d8f1ff',
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    width: W,
    height: H
  },
  scene: [MenuScene, GameScene]
});

// ── 觸控面板綁定與橫向閘門 ─────────────────────────────────────────
(function setupMobile(){
  const panel  = document.getElementById('touchPanel');
  const rotate = document.getElementById('rotateNotice');
  const touch  = isTouchDevice();

  const stick = document.getElementById('stick');
  const knob  = document.getElementById('stickKnob');

  // 搖桿歸位：放開或進入橫向閘門時清空方向輸入並回正旋鈕。
  function stickReset(){
    if(knob) knob.style.transform = 'translate(0px,0px)';
    touchInput.left = touchInput.right = touchInput.up = false;
  }

  if (touch) {
    document.body.classList.add('touch');
    panel.classList.remove('hidden');           // 僅觸控裝置顯示面板

    // 動作鈕（扣殺/撲球）：獨立追蹤，支援與搖桿同時操作。
    panel.querySelectorAll('.tbtn').forEach(btn => {
      const key = btn.dataset.key;
      const press   = () => { touchInput[key] = true;  btn.classList.add('active'); };
      const release = () => { touchInput[key] = false; btn.classList.remove('active'); };
      btn.addEventListener('touchstart',  e => { e.preventDefault(); press();   }, { passive:false });
      btn.addEventListener('touchend',    e => { e.preventDefault(); release(); }, { passive:false });
      btn.addEventListener('touchcancel', release);
      btn.addEventListener('pointerdown', press);
      btn.addEventListener('pointerup',   release);
      btn.addEventListener('pointerleave',release);  // 滑出邊界即釋放，避免卡鍵
    });

    // 移動搖桿：類比偏移映射為布林 left/right/up（過門檻才觸發），
    // 使 _controlHuman 與所有玩法數值維持不變。上推 = 跳躍。
    const RADIUS = 64, DEAD = 30;   // 加大死區，降低靈敏度、較好操控
    let stickId = null;
    const stickMove = (cx, cy) => {
      const r = stick.getBoundingClientRect();
      let dx = cx - (r.left + r.width / 2);
      let dy = cy - (r.top  + r.height / 2);
      const dist = Math.hypot(dx, dy);
      if (dist > RADIUS) { dx *= RADIUS / dist; dy *= RADIUS / dist; }
      knob.style.transform = `translate(${dx}px,${dy}px)`;
      touchInput.left  = dx < -DEAD;
      touchInput.right = dx >  DEAD;
      touchInput.up    = dy < -DEAD;
    };
    stick.addEventListener('touchstart', e => e.preventDefault(), { passive:false });
    stick.addEventListener('pointerdown', e => {
      stickId = e.pointerId;
      if (stick.setPointerCapture) stick.setPointerCapture(e.pointerId);
      stickMove(e.clientX, e.clientY);
    });
    stick.addEventListener('pointermove', e => {
      if (e.pointerId !== stickId) return;       // 只追蹤啟動搖桿的那根手指
      stickMove(e.clientX, e.clientY);
    });
    const stickEnd = e => { if (e.pointerId === stickId) { stickId = null; stickReset(); } };
    stick.addEventListener('pointerup',     stickEnd);
    stick.addEventListener('pointercancel', stickEnd);
  }

  function updateOrientation(){
    const portrait = window.matchMedia && window.matchMedia('(orientation: portrait)').matches;
    const show = touch && portrait;
    rotate.classList.toggle('hidden', !show);
    if (show) { stickReset(); touchInput.hit = false; }   // 直向暫停輸入
  }
  if (window.matchMedia) {
    const mq = window.matchMedia('(orientation: portrait)');
    if (mq.addEventListener) mq.addEventListener('change', updateOrientation);
    else if (mq.addListener) mq.addListener(updateOrientation);  // 舊版 Safari
  }
  window.addEventListener('resize', updateOrientation);
  window.addEventListener('orientationchange', updateOrientation);
  updateOrientation();
})();
</script>
