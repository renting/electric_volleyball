<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電氣鼠排球大作戰</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:14px;padding:16px;
    background:linear-gradient(180deg,#1b2a4a 0%,#27406e 100%);
    font-family:"Trebuchet MS","Microsoft JhengHei",sans-serif;color:#fff;
  }
  h1{font-size:clamp(20px,4vw,34px);letter-spacing:2px;text-shadow:0 3px 0 rgba(0,0,0,.35);}
  h1 .bolt{color:#ffb800;}
  #wrap{position:relative;width:min(96vw,920px);}
  #wrap canvas{display:block;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.45);}
  #hint{font-size:13px;line-height:1.7;opacity:.85;text-align:center;max-width:760px;}
  kbd{
    background:#fff;color:#23314a;border-radius:5px;padding:1px 7px;
    font-family:inherit;font-weight:bold;box-shadow:0 2px 0 rgba(0,0,0,.3);font-size:12px;
  }
</style>
</head>
<body>
<h1>⚡ 電氣鼠排球大作戰 <span class="bolt">PIKA VOLLEY</span> ⚡</h1>
<div id="wrap"></div>
<div id="hint">
  單人:<kbd>←</kbd><kbd>→</kbd> 移動 <kbd>↑</kbd> 跳躍 <kbd>Space</kbd>/<kbd>Z</kbd> 強力扣殺&nbsp;&nbsp;|&nbsp;&nbsp;
  雙人:P1 <kbd>A</kbd><kbd>D</kbd><kbd>W</kbd> + <kbd>G</kbd> 扣殺,P2 用方向鍵 + <kbd>L</kbd> 扣殺。<br>
  <kbd>P</kbd>/<kbd>Esc</kbd> 暫停 ・ <kbd>R</kbd> 重新開始 ・ 先得 15 分獲勝!
</div>
<script>
"use strict";

// ── 常數 ──────────────────────────────────────────────────────────
const W = 900, H = 500;
const GROUND = H - 46;
const NET_X = W / 2, NET_W = 10, NET_TOP = GROUND - 170;
const WIN_SCORE = 15;

// ── 音效 ──────────────────────────────────────────────────────────
let actx = null;
function beep(freq, dur = 0.07, type = "square", vol = 0.12) {
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + dur);
  } catch(e) {}
}

// ── 遊戲物件 ──────────────────────────────────────────────────────
function makePlayer(side) {
  return {
    side, r: 34,
    x: side === 0 ? W * 0.25 : W * 0.75,
    y: GROUND, vy: 0,
    onGround: true,
    hitCooldown: 0, smashFlash: 0,
    face: side === 0 ? 1 : -1,
    aiHitDelay: 0,
    texture: null,
    color1: side === 0 ? 0xffd92e : 0xffb84d,
    color2: side === 0 ? 0xe8a800 : 0xe07b00
  };
}

// ── 顏色工具 ──────────────────────────────────────────────────────
function lerpColor(c1, c2, t) {
  const r1=(c1>>16)&0xff, g1=(c1>>8)&0xff, b1=c1&0xff;
  const r2=(c2>>16)&0xff, g2=(c2>>8)&0xff, b2=c2&0xff;
  return (Math.round(r1+(r2-r1)*t)<<16)|(Math.round(g1+(g2-g1)*t)<<8)|Math.round(b1+(b2-b1)*t);
}

// 二次 Bezier 曲線折線近似
function qBez(x0,y0,cx,cy,x1,y1,n=8) {
  const pts=[];
  for(let i=0;i<=n;i++){
    const t=i/n, u=1-t;
    pts.push({x:u*u*x0+2*u*t*cx+t*t*x1, y:u*u*y0+2*u*t*cy+t*t*y1});
  }
  return pts;
}

// ── 背景繪製（MenuScene / GameScene 共用）─────────────────────────
function drawBackground(g, clouds) {
  // 天空漸層
  const SKY_TOP = 0x7ec8ff, SKY_BOT = 0xd8f1ff;
  const strips = 20, sh = GROUND / strips;
  for(let i=0;i<strips;i++){
    g.fillStyle(lerpColor(SKY_TOP, SKY_BOT, i/(strips-1)), 1);
    g.fillRect(0, i*sh, W, sh+1);
  }
  // 太陽
  g.fillStyle(0xfff3b0, 1); g.fillCircle(W-110, 80, 38);
  g.fillStyle(0xfff3b0, 0.4); g.fillCircle(W-110, 80, 54);
  // 雲
  for(const c of clouds){
    c.x += 0.15*c.s; if(c.x > W+80) c.x = -80;
    g.fillStyle(0xffffff, 0.9);
    g.fillCircle(c.x,         c.y,       20*c.s);
    g.fillCircle(c.x+22*c.s,  c.y+4*c.s, 16*c.s);
    g.fillCircle(c.x-22*c.s,  c.y+5*c.s, 15*c.s);
  }
  // 沙地
  g.fillStyle(0xf2d98c, 1); g.fillRect(0, GROUND, W, H-GROUND);
  g.fillStyle(0xe0bf66, 1); g.fillRect(0, GROUND, W, 6);
  // 網子
  g.fillStyle(0x3a4a63, 1); g.fillRect(NET_X-NET_W/2, NET_TOP, NET_W, GROUND-NET_TOP);
  g.lineStyle(2, 0xffffff, 0.65);
  for(let yy=NET_TOP+8; yy<GROUND; yy+=16){
    g.beginPath(); g.moveTo(NET_X-NET_W/2, yy); g.lineTo(NET_X+NET_W/2, yy); g.strokePath();
  }
  g.fillStyle(0xffffff, 1); g.fillRect(NET_X-NET_W/2-2, NET_TOP-4, NET_W+4, 6);
}

// ── renderPlayer / drawMonGraphics ────────────────────────────────
function renderPlayer(g, player) {
  if (player.texture) {
    // 未來：player.sprite.setPosition(player.x, player.y)
    return;
  }
  drawMonGraphics(g, player);
}

function drawMonGraphics(g, player) {
  const {x, y, r, face: f, onGround, smashFlash, color1, color2} = player;
  const squash = onGround ? 1 : 0.92;
  const cy = y - r * squash; // 身體中心 Y

  // 投影
  g.fillStyle(0x000000, 0.15);
  g.fillEllipse(x, GROUND+8, r*1.8, 14);

  // 閃電尾巴
  const tx=x-f*r*0.85, ty=cy+6;
  g.fillStyle(color2, 1);
  const tail=[
    {x:tx,        y:ty},
    {x:tx-f*14,   y:ty-10},
    {x:tx-f*8,    y:ty-12},
    {x:tx-f*22,   y:ty-26},
    {x:tx-f*12,   y:ty-24},
    {x:tx-f*20,   y:ty-40},
    {x:tx-f*2,    y:ty-20},
    {x:tx-f*8,    y:ty-18},
    {x:tx+f*2,    y:ty-6}
  ];
  g.beginPath(); g.moveTo(tail[0].x, tail[0].y);
  for(let i=1;i<tail.length;i++) g.lineTo(tail[i].x, tail[i].y);
  g.closePath(); g.fillPath();

  // 耳朵
  g.fillStyle(color1, 1);
  for(const s of [-1,1]){
    const pts1 = qBez(x+s*r*0.45, cy-r*0.55, x+s*r*0.95, cy-r*1.5,  x+s*r*0.55, cy-r*1.45);
    const pts2 = qBez(x+s*r*0.55, cy-r*1.45, x+s*r*0.2,  cy-r*1.1,  x+s*r*0.1,  cy-r*0.7);
    g.beginPath(); g.moveTo(pts1[0].x, pts1[0].y);
    pts1.forEach(p=>g.lineTo(p.x,p.y));
    pts2.slice(1).forEach(p=>g.lineTo(p.x,p.y));
    g.closePath(); g.fillPath();
  }

  // 身體
  g.fillStyle(color1, 1);
  g.fillEllipse(x, cy, r*2, r*2*squash);

  // 肚子
  g.fillStyle(0xffffff, 0.45);
  g.fillEllipse(x, cy+r*0.35, r*1.1, r*0.9);

  // 臉頰
  g.fillStyle(0xff7a3d, 1);
  g.fillCircle(x+f*r*0.55-f*4, cy+r*0.08, 7.5);
  g.fillCircle(x-f*r*0.35,     cy+r*0.1,  6);

  // 眼睛
  g.fillStyle(0x23272e, 1);
  g.fillCircle(x+f*r*0.32,  cy-r*0.22, 4.6);
  g.fillCircle(x-f*r*0.05,  cy-r*0.2,  4.2);
  g.fillStyle(0xffffff, 1);
  g.fillCircle(x+f*r*0.34,  cy-r*0.26, 1.6);
  g.fillCircle(x-f*r*0.03,  cy-r*0.24, 1.4);

  // 嘴巴
  g.lineStyle(2, 0x23272e, 1);
  g.beginPath();
  g.arc(x+f*r*0.16, cy-r*0.02, 5, 0.15*Math.PI, 0.85*Math.PI, false);
  g.strokePath();

  // 扣殺閃光
  if(smashFlash > 0){
    g.lineStyle(4, 0xffe63c, smashFlash/12);
    g.strokeCircle(x, cy, r+10+(12-smashFlash)*2);
  }
}

// ── MenuScene ─────────────────────────────────────────────────────
class MenuScene extends Phaser.Scene {
  constructor(){ super({ key: 'Menu' }); }

  create(){
    this.gfx    = this.add.graphics();
    this.clouds = [{x:120,y:70,s:1},{x:420,y:110,s:.7},{x:700,y:60,s:1.2},{x:830,y:140,s:.6}];
    this.staticPlayers = [makePlayer(0), makePlayer(1)];

    const TS = (txt, x, y, size, color, bold=true) =>
      this.add.text(x, y, txt, {
        fontFamily: "'Trebuchet MS',sans-serif", fontSize: size+'px',
        fontStyle: bold?'bold':'normal', color, align:'center'
      }).setOrigin(0.5);

    TS('⚡ 電氣鼠排球大作戰 ⚡',   W/2, 150, 40, '#ffd92e');
    TS('按 1 ─ 單人（普通）',       W/2, 235, 24, '#ffffff');
    TS('按 2 ─ 單人（困難）',       W/2, 275, 24, '#ffffff');
    TS('按 3 ─ 雙人對戰',           W/2, 315, 24, '#ffffff');
    TS('讓球落在對方場地就得分，先拿 15 分獲勝！', W/2, 370, 16, '#ccddff', false);
    TS('靠近球時按扣殺鍵，使出強力殺球！',        W/2, 396, 16, '#ccddff', false);
    TS('遊戲中按 P / Esc 暫停，按 R 重新開始',   W/2, 422, 16, '#ccddff', false);

    this.input.keyboard.on('keydown-ONE',   ()=>this._start('1P','normal'));
    this.input.keyboard.on('keydown-TWO',   ()=>this._start('1P','hard'));
    this.input.keyboard.on('keydown-THREE', ()=>this._start('2P', null));
    this.input.on('pointerdown',            ()=>this._start('1P','normal'));
  }

  _start(mode, aiLevel){
    beep(660,.1,'triangle'); beep(880,.12,'triangle');
    this.scene.start('Game', { mode, aiLevel });
  }

  update(){
    const g = this.gfx;
    g.clear();
    drawBackground(g, this.clouds);
    renderPlayer(g, this.staticPlayers[0]);
    renderPlayer(g, this.staticPlayers[1]);
    g.fillStyle(0x14213e, 0.55);
    g.fillRect(0, 0, W, H);
  }
}

// ── GameScene ─────────────────────────────────────────────────────
class GameScene extends Phaser.Scene {
  constructor(){ super({ key: 'Game' }); }

  create(){
    const data     = this.scene.settings.data || {};
    this.mode      = data.mode    || '1P';
    this.aiLevel   = data.aiLevel || 'normal';
    this.score     = [0, 0];
    this.state     = 'serve';
    this.paused    = false;
    this.particles = [];
    this.clouds    = [{x:120,y:70,s:1},{x:420,y:110,s:.7},{x:700,y:60,s:1.2},{x:830,y:140,s:.6}];
    this.players   = [makePlayer(0), makePlayer(1)];
    this.ball      = { x:0, y:0, vx:0, vy:0, r:17, spin:0 };
    this.serveTimer = 0; this.pointTimer = 0; this.pointSide = 0;

    this._resetRally(Math.random() < 0.5 ? 0 : 1);

    // Graphics（在所有 Text 之前加入，確保 Text 疊在上方）
    this.gfx         = this.add.graphics();
    this.overlayGfx  = this.add.graphics();

    // 分數文字
    const TS = (t,x,y,sz,col,bold=true)=>
      this.add.text(x,y,t,{fontFamily:"'Trebuchet MS',sans-serif",fontSize:sz+'px',fontStyle:bold?'bold':'normal',color:col,align:'center'}).setOrigin(0.5);

    this.scoreTxt = [
      TS('0', W*0.25, 40, 44, '#23314a'),
      TS('0', W*0.75, 40, 44, '#23314a')
    ];
    TS(this.mode==='2P'?'PLAYER 1':'YOU', W*0.25, 68, 13, '#23314a');
    TS(this.mode==='2P'?'PLAYER 2':'COM', W*0.75, 68, 13, '#23314a');

    // 狀態文字
    this.readyTxt = TS('READY...',  W/2, 150, 30, '#23314a').setVisible(false);
    this.pointTxt = TS('',          W/2, 150, 38, '#1f8a4c').setVisible(false);
    this.overTitle= TS('',          W/2, 200, 52, '#ffd92e').setVisible(false);
    this.overScore= TS('',          W/2, 255, 26, '#ffffff').setVisible(false);
    this.overHint = TS('按 R 再來一局 ・ 按 Enter 或點擊畫面回到選單', W/2, 300, 18, '#ffffff', false).setVisible(false);
    this.pauseTitle= TS('⏸ 暫停中', W/2, 215, 52, '#ffd92e').setVisible(false);
    this.pauseHint = TS('按 P / Esc 或點擊畫面繼續 ・ 按 R 重新開始', W/2, 262, 18, '#ffffff', false).setVisible(false);

    // 鍵盤
    const KC = Phaser.Input.Keyboard.KeyCodes;
    this.kbd = this.input.keyboard.addKeys({
      left:KC.LEFT, right:KC.RIGHT, up:KC.UP,
      a:KC.A, d:KC.D, w:KC.W, g:KC.G, l:KC.L,
      space:KC.SPACE, z:KC.Z,
      p:KC.P, esc:KC.ESC, r:KC.R, enter:KC.ENTER
    });
    this.input.keyboard.addCapture([KC.SPACE,KC.UP,KC.DOWN,KC.LEFT,KC.RIGHT]);

    this.input.keyboard.on('keydown-P',   ()=>this._togglePause());
    this.input.keyboard.on('keydown-ESC', ()=>this._togglePause());
    this.input.keyboard.on('keydown-R',   ()=>this._restart());
    this.input.keyboard.on('keydown-ENTER',()=>{ if(this.state==='over') this.scene.start('Menu'); });
    this.input.on('pointerdown',()=>{
      if(this.state==='over')    this.scene.start('Menu');
      else if(this.paused)       this._togglePause();
    });
  }

  _togglePause(){
    if(this.state==='over') return;
    this.paused = !this.paused;
    beep(this.paused?300:520, .08, 'triangle');
  }

  _restart(){
    this.scene.restart({ mode: this.mode, aiLevel: this.aiLevel });
  }

  _resetRally(side){
    this.players[0].x = W*0.25; this.players[1].x = W*0.75;
    this.players.forEach(p=>{ p.y=GROUND; p.vy=0; p.onGround=true; });
    this.ball.x = side===0 ? W*0.25 : W*0.75;
    this.ball.y=110; this.ball.vx=0; this.ball.vy=0; this.ball.spin=0;
    this.serveTimer=50;
  }

  _burst(x,y,color,n){
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2, s=2+Math.random()*4;
      this.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:26+Math.random()*14,color});
    }
  }

  _tryPowerHit(p){
    const dx=this.ball.x-p.x, dy=this.ball.y-(p.y-p.r*0.4);
    if(Math.hypot(dx,dy) < p.r+this.ball.r+24){
      const dir=p.side===0?1:-1;
      const aimDown=this.ball.y<NET_TOP+30?0.85:0.25;
      this.ball.vx=dir*(11+Math.random()*3);
      this.ball.vy=-3+aimDown*12*Math.random()+(this.ball.y<NET_TOP?6:-6);
      this.ball.spin=dir*0.5;
      p.hitCooldown=18; p.smashFlash=12;
      this.cameras.main.shake(133, 0.005);
      this._burst(this.ball.x, this.ball.y, 0xffd92e, 14);
      beep(180,.12,'sawtooth',.18); beep(90,.15,'square',.12);
    } else {
      p.hitCooldown=10;
    }
  }

  _predictBallX(){
    let x=this.ball.x, y=this.ball.y, vx=this.ball.vx, vy=this.ball.vy;
    for(let i=0;i<200;i++){
      vy+=0.42; x+=vx; y+=vy;
      if(x<this.ball.r||x>W-this.ball.r) vx*=-1;
      if(y>=GROUND-this.ball.r) break;
    }
    return x;
  }

  _controlHuman(p,left,right,up,hit){
    const SPD=5.4;
    if(left.isDown)  { p.x-=SPD; p.face=-1; }
    if(right.isDown) { p.x+=SPD; p.face=1; }
    if(up.isDown && p.onGround){ p.vy=-13.5; p.onGround=false; beep(330,.05,'sine',.06); }
    if(hit && hit.isDown && p.hitCooldown<=0) this._tryPowerHit(p);
  }

  _controlAI(p){
    const SPD=this.aiLevel==='hard'?5.6:4.6;
    const onMySide=this.ball.x>NET_X;
    let target=onMySide?this._predictBallX():W*0.75;
    target=Math.max(NET_X+p.r+14, Math.min(W-p.r, target));
    if(Math.abs(p.x-target)>(this.aiLevel==='hard'?4:14)){
      p.x+=p.x<target?SPD:-SPD;
      p.face=this.ball.x<p.x?-1:1;
    }
    const dx=this.ball.x-p.x, dy=this.ball.y-(p.y-p.r);
    if(p.onGround&&onMySide&&Math.abs(dx)<70&&dy<0&&dy>-190&&this.ball.vy>-2){
      p.vy=-13.5; p.onGround=false;
    }
    const dist=Math.hypot(this.ball.x-p.x, this.ball.y-(p.y-p.r*0.4));
    if(dist<p.r+this.ball.r+26&&p.hitCooldown<=0){
      p.aiHitDelay--;
      if(p.aiHitDelay<=0){
        if(Math.random()<(this.aiLevel==='hard'?0.7:0.4)) this._tryPowerHit(p);
        p.aiHitDelay=6;
      }
    }
  }

  _updatePhysics(){
    const b=this.ball;
    // 玩家
    for(const p of this.players){
      p.vy+=0.7; p.y+=p.vy;
      if(p.y>=GROUND){ p.y=GROUND; p.vy=0; p.onGround=true; }
      const minX=p.side===0?p.r:NET_X+NET_W/2+p.r;
      const maxX=p.side===0?NET_X-NET_W/2-p.r:W-p.r;
      p.x=Math.max(minX, Math.min(maxX,p.x));
      if(p.hitCooldown>0) p.hitCooldown--;
      if(p.smashFlash>0)  p.smashFlash--;
    }

    if(this.state==='serve'){ if(--this.serveTimer<=0) this.state='play'; return; }
    if(this.state!=='play') return;

    // 球
    b.vy+=0.42; b.x+=b.vx; b.y+=b.vy; b.spin*=0.99;

    if(b.x<b.r)    { b.x=b.r;   b.vx=Math.abs(b.vx)*0.9;  beep(440,.04); }
    if(b.x>W-b.r)  { b.x=W-b.r; b.vx=-Math.abs(b.vx)*0.9; beep(440,.04); }
    if(b.y<b.r)    { b.y=b.r;   b.vy=Math.abs(b.vy)*0.9; }

    // 網子
    const nl=NET_X-NET_W/2-b.r, nr=NET_X+NET_W/2+b.r;
    if(b.x>nl&&b.x<nr&&b.y>NET_TOP-b.r){
      if(b.y<NET_TOP+14&&b.vy>0){
        b.y=NET_TOP-b.r; b.vy=-Math.abs(b.vy)*0.75;
        b.vx+=(b.x<NET_X?-1:1)*1.2;
      } else {
        b.x=b.vx>0?nl:nr; b.vx*=-0.85; beep(520,.05);
      }
    }

    // 玩家碰撞
    for(const p of this.players){
      const cx=p.x, cy=p.y-p.r*0.4;
      const dx=b.x-cx, dy=b.y-cy;
      const dist=Math.hypot(dx,dy), minD=p.r+b.r;
      if(dist<minD&&dist>0.001){
        const nx=dx/dist, ny=dy/dist;
        b.x=cx+nx*minD; b.y=cy+ny*minD;
        const speed=Math.max(8.5, Math.hypot(b.vx,b.vy)*0.85);
        b.vx=nx*speed*0.95; b.vy=ny*speed-4.5+p.vy*0.35;
        if(b.vy>-2&&ny<0.2) b.vy=-6;
        this._burst(b.x,b.y,0xffffff,6);
        beep(600+Math.random()*120,.05,'triangle',.1);
      }
    }

    const sp=Math.hypot(b.vx,b.vy);
    if(sp>17){ b.vx*=17/sp; b.vy*=17/sp; }

    // 落地得分
    if(b.y>=GROUND-b.r){
      const winner=b.x<NET_X?1:0;
      this.score[winner]++;
      this.scoreTxt[winner].setText(String(this.score[winner]));
      this.pointSide=winner;
      this._burst(b.x,GROUND-10,0xff7b54,26);
      this.cameras.main.shake(200,0.007);
      beep(winner===0?740:240,.25,'square',.15);
      this.state = this.score[winner]>=WIN_SCORE ? 'over' : 'point';
      if(this.state==='point') this.pointTimer=60;
    }
  }

  update(){
    // 暫停
    if(this.paused){
      this.overlayGfx.clear();
      this.overlayGfx.fillStyle(0x14213e,0.6); this.overlayGfx.fillRect(0,0,W,H);
      this.pauseTitle.setVisible(true); this.pauseHint.setVisible(true);
      this.readyTxt.setVisible(false);  this.pointTxt.setVisible(false);
      return;
    }
    this.pauseTitle.setVisible(false); this.pauseHint.setVisible(false);

    // 控制
    if(this.state==='play'||this.state==='serve'){
      if(this.mode==='2P'){
        this._controlHuman(this.players[0], this.kbd.a, this.kbd.d, this.kbd.w, this.kbd.g);
        this._controlHuman(this.players[1], this.kbd.left, this.kbd.right, this.kbd.up, this.kbd.l);
      } else {
        this._controlHuman(this.players[0], this.kbd.left, this.kbd.right, this.kbd.up, null);
        if((this.kbd.space.isDown||this.kbd.z.isDown)&&this.players[0].hitCooldown<=0)
          this._tryPowerHit(this.players[0]);
        this._controlAI(this.players[1]);
      }
    }

    this._updatePhysics();

    // 粒子步進
    for(const pt of this.particles){ pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.25; pt.life--; }
    this.particles=this.particles.filter(pt=>pt.life>0);

    // Point 計時
    if(this.state==='point'){ if(--this.pointTimer<=0){ this._resetRally(1-this.pointSide); this.state='serve'; } }

    // ── 繪圖 ──
    const g=this.gfx;
    g.clear();
    drawBackground(g, this.clouds);
    renderPlayer(g, this.players[0]);
    renderPlayer(g, this.players[1]);

    // 球
    const b=this.ball;
    const sh=Math.max(0.25, 1-(GROUND-b.y)/360);
    g.fillStyle(0x000000, 0.18*sh);
    g.fillEllipse(b.x, GROUND+8, (b.r*sh+6)*2, 10);
    g.fillStyle(0xffffff,1); g.fillCircle(b.x,b.y,b.r);
    const ba=b.spin*this.time.now*0.004;
    g.fillStyle(0xff5c5c,1);
    g.beginPath(); g.moveTo(b.x,b.y); g.arc(b.x,b.y,b.r,ba-0.5,ba+1.1,false); g.closePath(); g.fillPath();
    g.beginPath(); g.moveTo(b.x,b.y); g.arc(b.x,b.y,b.r,ba+2.6,ba+4.2,false); g.closePath(); g.fillPath();
    g.lineStyle(1.5,0xd8d8d8,1); g.strokeCircle(b.x,b.y,b.r-0.8);

    // 粒子
    for(const pt of this.particles){
      g.fillStyle(pt.color, Math.min(1,pt.life/20));
      g.fillRect(pt.x-2.5, pt.y-2.5, 5, 5);
    }

    // 狀態文字
    this.readyTxt.setVisible(this.state==='serve');

    if(this.state==='point'){
      const nm=this.mode==='2P'?(this.pointSide===0?'P1':'P2'):(this.pointSide===0?'你':'電腦');
      this.pointTxt.setText(nm+' 得分！').setColor(this.pointSide===0?'#1f8a4c':'#c0392b').setVisible(true);
    } else if(this.state!=='over') {
      this.pointTxt.setVisible(false);
    }

    // 遊戲結束
    this.overlayGfx.clear();
    if(this.state==='over'){
      this.overlayGfx.fillStyle(0x14213e,0.55); this.overlayGfx.fillRect(0,0,W,H);
      const w=this.score[0]>this.score[1]?0:1;
      const nm=this.mode==='2P'?(w===0?'PLAYER 1 WINS!':'PLAYER 2 WINS!'):(w===0?'你贏了！':'電腦獲勝！');
      this.overTitle.setText(nm).setVisible(true);
      this.overScore.setText(this.score[0]+' : '+this.score[1]).setVisible(true);
      this.overHint.setVisible(true);
      this.pointTxt.setVisible(false);
    } else {
      this.overTitle.setVisible(false);
      this.overScore.setVisible(false);
      this.overHint.setVisible(false);
    }
  }
}

// ── Phaser.Game ───────────────────────────────────────────────────
new Phaser.Game({
  type: Phaser.AUTO,
  parent: 'wrap',
  backgroundColor: '#d8f1ff',
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH,
    width: W,
    height: H
  },
  scene: [MenuScene, GameScene]
});
</script>
